ServerName localhost

DocumentRoot /app

<Directory /app>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.php index.html
</Directory>

<FilesMatch "^\.">
    Require all denied
</FilesMatch>

<LocationMatch "^/(data|ops|cli|backups)(/|$)">
    Require all denied
</LocationMatch>

RewriteEngine On
RewriteRule ^/?(Menueplan|index_Anmeldung\.php)(/.*)?$ / [R=308,L]

RemoteIPHeader X-Forwarded-For
RemoteIPTrustedProxy 127.0.0.1

Header always set X-Content-Type-Options "nosniff"
Header always set Referrer-Policy "same-origin"
